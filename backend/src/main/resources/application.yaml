spring:
  application:
    name: backend
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/tracelm
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

llm:
  default-provider: gemini

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini

gemini:
  api-key: ${GEMINI_API_KEY}
  base-url: https://generativelanguage.googleapis.com/v1beta/models
  default-model: gemini-3.1-flash-lite