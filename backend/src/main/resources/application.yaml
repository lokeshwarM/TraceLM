spring:
  application:
    name: backend
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_ADDRESS}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

google:
  client:
    id: ${GOOGLE_CLIENT_ID}
    secret: ${GOOGLE_CLIENT_SECRET}

server:
  port: ${PORT:8080}

llm:
  default-provider: gemini

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini

gemini:
  api-key: ${GEMINI_API_KEY}
  base-url: https://generativelanguage.googleapis.com/v1beta/models
  default-model: gemini-3.1-flash-lite

automation:
  greenhouse:
    boards: stripe,vercel,figma,scaleai,anthropic,razorpay,inmobi,phonepe,makemytrip,groww,urbancompany,browserstack,cred,swiggy
  lever:
    boards: netflix,lever,leverdemo,unacademy,curefit,zeta,upgrad,cleartax
